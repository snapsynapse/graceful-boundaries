<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 &mdash; Graceful Boundaries</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/imgs/favicon.ico" sizes="48x48">
  <link rel="icon" href="/imgs/logo.png" type="image/png" sizes="1000x1000">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a2e;
      --text-muted: #64748b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e2e8f0;
      --code-bg: #f1f5f9;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --mono: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --accent: #60a5fa;
        --accent-hover: #93bbfc;
        --border: #334155;
        --code-bg: #1e293b;
      }
    }

    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    .page { max-width: 480px; }
    .status { font-size: 4rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .message { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2rem; }
    pre {
      background: var(--code-bg);
      padding: 1.25rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.8rem;
      text-align: left;
      overflow-x: auto;
      margin-bottom: 2rem;
    }
    .links { display: flex; gap: 1.5rem; justify-content: center; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="page">
    <div class="status">404</div>
    <p class="message">This page doesn't exist &mdash; but at least you got a structured response.</p>
<pre>{
  "error": "not_found",
  "detail": "The page you requested does not exist.",
  "why": "Graceful Boundaries is a single-page spec site."
}</pre>
    <div class="links">
      <a href="/">Home</a>
      <a href="https://github.com/snapsynapse/graceful-boundaries" target="_blank" rel="noopener">GitHub</a>
      <a href="https://github.com/snapsynapse/graceful-boundaries/blob/main/spec.md" target="_blank" rel="noopener">Specification</a>
    </div>
  </div>
</body>
</html>
